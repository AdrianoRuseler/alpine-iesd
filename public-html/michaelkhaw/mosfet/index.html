<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-channel MOSFET (NMOS)</title>
    <style>
        /* Make the player fill the entire screen */
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        #container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Ensure the Ruffle element stays responsive */
        ruffle-player {
            width: 100%;
            height: 100%;
        }
    </style>
    <script src="../../ruffle/ruffle.js"></script>
</head>

<body>

    <div id="container">

        <script>
            window.RufflePlayer = window.RufflePlayer || {};
            window.RufflePlayer.config = {
                "autoplay": "on",
                "unmuteOverlay": "hidden",
                "letterbox": "on",
                "warnOnUnsupportedContent": false
            };

            window.addEventListener("load", (event) => {
                const ruffle = window.RufflePlayer.newest();
                const player = ruffle.createPlayer();
                const container = document.getElementById("container");
                container.appendChild(player);

                // Replace with your local SWF path to avoid CORS issues
                player.load("loader.swf").then(() => {
                    console.log("Ruffle successfully loaded the SWF!");
                }).catch((e) => {
                    console.error("Ruffle failed to load:", e);
                });
            });
        </script>
    </div>
</body>

</html>
